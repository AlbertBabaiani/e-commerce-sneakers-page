<div class="showcase-img">
  <picture>
    <img [src]="imgUrl()" alt="Sneakers Image 1" />
  </picture>

  <button type="button" (click)="previous()" class="showcase-btn previous">
    <img src="assets/images/shared/icon-previous.svg" alt="Previous button" />
  </button>

  <button type="button" (click)="next()" class="showcase-btn next">
    <img src="assets/images/shared/icon-next.svg" alt="Next button" />
  </button>
</div>
